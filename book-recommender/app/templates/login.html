{% extends "base.html" %}
{% block title %}Sign In — Bibliomind{% endblock %}
{% block extra_css %}
<style>
.auth-page {
  min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 2rem;
}
.auth-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 2.5rem; width: 100%; max-width: 420px;
}
.auth-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 0.5rem; }
.auth-sub { color: var(--muted); font-size: 0.875rem; margin-bottom: 2rem; }
.form-group { margin-bottom: 1.25rem; }
.form-label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem; }
.form-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 0.65rem 0.9rem; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none;
  transition: border-color .2s;
}
.form-input:focus { border-color: var(--accent); }
.auth-footer { margin-top: 1.5rem; text-align: center; font-size: 0.875rem; color: var(--muted); }
.auth-footer a { color: var(--accent); text-decoration: none; }
</style>
{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to see your AI book recommendations.</p>
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Sign In</button>
    </form>
    <p class="auth-footer">No account? <a href="{{ url_for('main.register') }}">Create one free</a></p>
    <p class="auth-footer" style="margin-top:.5rem;">Demo: <code style="color:var(--accent)">alice@example.com</code> / <code style="color:var(--accent)">password123</code></p>
  </div>
</div>
{% endblock %}
